<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>ਅੱਪਲੋਡ ਪੈਨਲ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 50px; text-align: center;">
    <h1>ਫੋਟੋਆਂ ਚੁਣੋ</h1>
    <input type="file" id="file" accept="image/*" multiple onchange="uploadFiles(this.files)">
    <br><br>
    <a href="index.html" class="btn">ਵਾਪਸ ਜਾਓ</a>
    <script>
        function uploadFiles(files) {
            window.opener.displayGallery(files);
            alert("ਫੋਟੋਆਂ ਗੈਲਰੀ ਵਿੱਚ ਜੁੜ ਗਈਆਂ!");
        }
    </script>
</body>
</html>
