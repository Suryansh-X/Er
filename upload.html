<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>ਅੱਪਲੋਡ ਪੈਨਲ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center h-screen">
    <h1 class="text-3xl mb-6">ਫੋਟੋਆਂ ਚੁਣੋ</h1>
    <input type="file" id="file" accept="image/*" multiple onchange="uploadFiles(this.files)" class="mb-4">
    <button onclick="window.close()" class="bg-red-800 px-6 py-2 rounded">ਬੰਦ ਕਰੋ</button>

    <script>
        function uploadFiles(files) {
            window.opener.displayGallery(files);
            alert("ਫੋਟੋਆਂ ਗੈਲਰੀ ਵਿੱਚ ਜੁੜ ਗਈਆਂ!");
        }
    </script>
</body>
</html>
