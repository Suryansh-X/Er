<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਹਰਤੇਜ ਬਰਿਆਣਾ | Official Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* ਕਲਰ ਹਿਊ ਐਨੀਮੇਸ਼ਨ (ਬਿਨਾਂ RGB) */
        @keyframes hueRotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .animated-bg { animation: hueRotate 20s infinite linear; }
        
        /* ਨਾਮ ਦਾ ਐਨੀਮੇਸ਼ਨ (White to Black) */
        @keyframes nameShift { 0%, 100% { color: #fff; } 50% { color: #000; text-shadow: 0 0 10px #fff; } }
        .name-anim { animation: nameShift 5s infinite ease-in-out; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .gold-border { border: 2px solid #D4AF37; }
    </style>
</head>
<body class="animated-bg">

    <canvas id="punjabiParticles"></canvas>

    <header class="h-screen flex flex-col items-center justify-center text-center">
        <h1 class="text-8xl font-bold uppercase name-anim transition-all">ਹਰਤੇਜ ਬਰਿਆਣਾ</h1>
        <p class="mt-5 text-2xl tracking-[0.3em] opacity-90">ਪੰਜਾਬੀ ਵਿਰਸਾ • ਇਤਿਹਾਸ • ਮਸ਼ੀਨਰੀ</p>
    </header>

    <section id="gallery" class="py-20 bg-black/60">
        <h2 class="text-4xl text-center mb-10 font-bold">ਯਾਦਗਾਰੀ ਤਸਵੀਰਾਂ</h2>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 px-10"></div>
        <div class="text-center mt-12">
            <button onclick="accessGallery()" class="bg-red-800 text-white px-10 py-4 rounded font-bold hover:scale-110 transition">ਅੱਪਲੋਡ ਪੈਨਲ</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
