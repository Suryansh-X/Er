
<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਹਰਤੇਜ ਬਰਿਆਣਾ | Official Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
</head>
<body>
    <div class="progress-bar" id="myBar"></div>

    <header id="home">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="tractor-video.mp4" type="video/mp4">
        </video>
        <audio id="tumbi" src="tumbi.mp3" autoplay loop></audio>
        <div class="overlay" data-aos="fade-in">
            <h1>ਹਰਤੇਜ ਬਰਿਆਣਾ</h1>
            <p>ਪੰਜਾਬੀ ਵਿਰਸਾ | ਖੇਤੀਬਾੜੀ | ਮਸ਼ੀਨਰੀ</p>
        </div>
    </header>

    <section id="gallery" data-aos="fade-up">
        <h2>ਮੇਰੀਆਂ ਯਾਦਗਾਰੀ ਤਸਵੀਰਾਂ</h2>
        <div class="grid" id="grid"></div>
        <button class="btn" onclick="accessGallery()">ਅੱਪਲੋਡ ਪੈਨਲ</button>
    </section>

    <section id="insta" data-aos="fade-up">
        <h2>ਇੰਸਟਾਗ੍ਰਾਮ</h2>
        <div class="sk-instagram-feed" data-embed-id="25688213"></div>
        <script src="https://widgets.sociablekit.com/instagram-feed/widget.js" defer></script>
    </section>

    <div class="social-bar">
        <a href="https://instagram.com/bariana_farm" target="_blank">📷</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
    <script src="script.js"></script>
</body>
</html>
